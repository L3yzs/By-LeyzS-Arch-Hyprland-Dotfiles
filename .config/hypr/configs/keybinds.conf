$terminal = kitty
$fileManager = thunar
$menu = wofi --show drun
$clipboard = cliphist list

$mainMod = SUPER

# Scripts and apps binds

## Exec
bind = $mainMod, A, exec, $menu
bind = $mainMod, R, exec, $HOME/.config/hypr/scripts/wallpapers/set-random.sh
bind = $mainMod, W, exec, $HOME/.config/hypr/scripts/wallpapers/set-wallpaper.sh

#Fullscrean
bind = SUPER_ALT, E, exec, hyprctl dispatch fullscreen 1
bind = SUPER_ALT, W, fullscreen, 0

# WM Control binds
bind = $mainMod, Q, killactive,
bind = $mainMod, F, togglefloating,
## Window Switch
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5


# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10
bind = $mainMod SHIFT, left, movetoworkspace, -1
bind = $mainMod SHIFT, right, movetoworkspace, +1


# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 5%-


# Medya Kontrol Tuşları
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous


# =========================================================================================
# [TR] DOSYA YÖNETİCİSİ (Nemo) / [EN] FILE MANAGER (Nemo)
# =========================================================================================
bind = CTRL ALT, E, exec, nemo

# =========================================================================================
# [TR] EKRANI KİLİTLE / [EN] LOCK THE SCREEN
# =========================================================================================
bind = SUPER, L, exec, ~/.config/hypr/lock.sh

# =========================================================================================
# [TR] TERMİNAL (Kitty) VE RE:ZERO SES EFEKTİ
# [EN] TERMINAL (Kitty) AND RE:ZERO SOUND EFFECT
# =========================================================================================
bind = CTRL ALT, T, exec, paplay "/home/leyzs/.config/Kitty-Efeckt/rezero_death.mp3" & kitty

# =========================================================================================
# [TR] TARAYICI (Helium Browser) / [EN] BROWSER (Helium Browser)
# =========================================================================================
bind = CTRL ALT, F, exec, firefox

# =========================================================================================
# [TR] RASTGELE DUVAR KAĞIDI DEĞİŞTİRİCİ (Statik)
# [EN] RANDOM WALLPAPER CHANGER (Static)
# =========================================================================================
bind = SUPER, R, exec, ~/.config/hypr/scripts/wallpapers/random-wallpaper.sh

# =========================================================================================
# [TR] WOFI İLE HAREKETLİ ARKA PLAN SEÇİCİ
# [EN] ANIMATED WALLPAPER PICKER VIA WOFI
# =========================================================================================
bind = SUPER, K, exec, ~/.config/hypr/wallpaper-picker.sh

# =========================================================================================
# [TR] WOFI İLE HAREKETLİ ARKA PLAN BAŞLATICI
# [EN] ANIMATED WALLPAPER LAUNCHER VIA WOFI
# =========================================================================================
bind = $mainMod ALT, K, exec, /home/leyzs/.config/hypr/scripts/wallpaper-picker2.sh

# =========================================================================================
# [TR] EKRAN GÖRÜNTÜSÜ ALMA
# 1. Renklerin bozulmaması için Vibrance shader'ı geçici olarak kapatır.
# 2. Seçili alanın ekran görüntüsünü alır.
# 3. Shader'ı tekrar aktif eder.
#
# [EN] SCREENSHOT (Shader Protected)
# 1. Temporarily disables Vibrance shader to prevent color distortion.
# 2. Takes a screenshot of the selected region.
# 3. Re-enables the shader.
# =========================================================================================
#Ss
bind = shift, print, exec, pkill -9 slurp; grimblast --freeze copysave area "/home/leyzs/Ekran Görüntülerim/$(date +'%Y-%m-%d_%H-%M-%S').png"

# Vibrance Shader Toggle
bind = SUPER ALT, P, exec, ~/.config/hypr/scripts/toggle_vibrance.sh

