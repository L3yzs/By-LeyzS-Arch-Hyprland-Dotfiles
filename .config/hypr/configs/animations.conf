animations {
    enabled = yes

    bezier = durma, 1, 1, 1, 1
    bezier = firlat, 0.25, 1, 0.5, 1
    bezier = firlama, 0.05, 0.9, 0.1, 1.05
    bezier = wind, 0.05, 0.9, 0.1, 1.0
    bezier = winIn, 0.05, 0.9, 0.1, 1.01
    bezier = winOut, 0.7, 0, 0.1, 1.0
    bezier = linear, 0.0, 0.0, 1.0, 1.0
    bezier = liner, 1, 1, 1, 1
    bezier = almostLinear, 0.5, 0.5, 0.75, 1.0
    # ------------------------------------
    animation = windows, 1, 10, wind, slide
    animation = windowsIn, 1, 10, winIn, popin 80%
    animation = layersOut, 1, 4, firlat, slide bottom
    animation = layersIn, 1, 5, firlat, slide bottom
    animation = windowsIn, 1, 4, winIn, slide
    animation = windowsMove, 1, 4, wind, slide
    animation = border, 1, 1, liner
    animation = borderangle, 1, 60, durma, loop
    animation = workspaces, 1, 5, wind, slide
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, almostLinear
}

dwindle {
    pseudotile = true
    preserve_split = true
}

# Katmanların (layer) kapanışını 2 saniyeye (20 birim) yayar
animation = layers, 1, 20, default, fade
